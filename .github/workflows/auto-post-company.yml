name: Auto-post to LinkedIn (Company)

concurrency:
  group: git-push-${{ github.ref_name }}
  cancel-in-progress: false

# Company-page pipeline -- mirrors auto-post.yml but with:
# - LINKEDIN_AUDIENCE=company set at job level
# - LINKEDIN_ORG_TOKEN / LINKEDIN_ORG_URN secrets
# - Staggered cron times (06:30 generate, 07:15 publish) so this pipeline
#   does NOT race the personal pipeline (05:00 generate, 05:15+06:00 publish)
# - Reads/writes company_posts_history/ instead of posts_history/
#
# Schedule (UTC / Muscat +4):
# 06:30 UTC (10:30 Muscat) -- generate draft for today's company pillar
# 07:15 UTC (11:15 Muscat) -- publish-sweep: oldest approved company post for today
#
# Pillar map (defined in company_content_strategy.py):
#   Monday    -> product_proof     (generated Saturday)
#   Wednesday -> feature_spotlight (generated Monday)
#   Friday    -> oman_market       (generated Wednesday)
#   Manual    -> hiring, partnership (workflow_dispatch only)

on:
  schedule:
    # generate draft for today's company pillar
    - cron: "30 6 * * *"
    # publish sweep -- pillar-agnostic, publishes oldest approved company post for today
    - cron: "15 7 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run."
        required: true
        default: "generate_draft"
        type: choice
        options:
          - generate_draft
          - publish_approved
          - publish_draft
          - approve_draft
          - revise_draft
          - publish_now
      draft_file:
        description: "Draft JSON path. Required for approve_draft and publish_draft. e.g. company_posts_history/20260520_063000_product_proof.json"
        required: false
        default: ""
      revision_notes:
        description: "Feedback for revise_draft."
        required: false
        default: ""
      pillar:
        description: "Force a specific company pillar (product_proof/feature_spotlight/oman_market/hiring/partnership)."
        required: false
        default: ""
      dry_run:
        description: "For publish_now only: generate without publishing."
        required: false
        default: "false"
      confirm_publish_now:
        description: "Required safety flag for publish_now. Type true to allow immediate generation and publishing."
        required: false
        default: "false"
      model:
        description: "Override the Claude model. Leave blank for default."
        required: false
        default: ""

jobs:
  post:
    name: company-generate-or-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Runs on the 06:30 (generate) cron and any workflow_dispatch action
    # except the publish_approved cron which is handled by the sweep job below.
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '30 6 * * *') ||
      (github.event_name == 'workflow_dispatch')
    env:
      LINKEDIN_AUDIENCE: company
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Verify card rendering (Arabic shaping) before posting
        run: python verify_render.py

      - name: Detect run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=generate_draft" >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate or publish (company audience)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # PERMANENT BY DESIGN -- see COMPANY_SETUP.md.
          # The company pipeline publishes to Fahad's personal feed with company
          # voice and a separate company_posts_history/ folder. We do NOT pursue
          # a real org token because Community Management API is restricted to
          # LinkedIn Marketing Partners (greyed-out in the Developer dashboard).
          # Personal feed outperforms the company page for B2B reach anyway.
          LINKEDIN_ORG_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          NOTIFY_FROM: ${{ vars.NOTIFY_FROM }}
          NOTIFY_ON_DRAFT: ${{ vars.NOTIFY_ON_DRAFT }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          POST_MODE: ${{ steps.mode.outputs.mode }}
          PUBLISH_DRAFT_PATH: ${{ inputs.draft_file }}
          REVISION_NOTES: ${{ inputs.revision_notes }}
          FORCE_PILLAR: ${{ inputs.pillar }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CONFIRM_PUBLISH_NOW: ${{ inputs.confirm_publish_now || 'false' }}
          ANTHROPIC_MODEL: ${{ inputs.model }}
        run: python main.py

      - name: Commit company history and dashboard
        if: always()
        env:
          RUN_MODE: ${{ steps.mode.outputs.mode }}
          DRAFT_FILE: ${{ inputs.draft_file }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add company_posts_history/ 2>/dev/null || true
          if [ "$RUN_MODE" = "approve_draft" ] && [ -n "$DRAFT_FILE" ]; then
            MSG="approve (company): $(basename "$DRAFT_FILE")"
          else
            MSG="data (company): update $(date -u '+%Y-%m-%d %H:%M UTC')"
          fi
          git diff --cached --quiet || git commit -m "$MSG"
          git pull --rebase --autostash origin ${GITHUB_REF_NAME}
          python dashboard.py
          git add docs/
          git diff --cached --quiet || git commit -m "dashboard: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          for _try in 1 2 3; do
            git push origin HEAD:${GITHUB_REF_NAME} && break
            [ $_try -eq 3 ] && { echo "Push failed after 3 attempts"; exit 1; }
            echo "Push attempt $_try rejected -- rebasing and retrying..."
            git pull --rebase --autostash origin ${GITHUB_REF_NAME}
            python dashboard.py
            git add docs/
            git diff --cached --quiet || git commit -m "dashboard: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          done

  sweep:
    name: company-publish-sweep
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'schedule' && github.event.schedule == '15 7 * * *'
    env:
      LINKEDIN_AUDIENCE: company
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Verify card rendering (Arabic shaping) before posting
        run: python verify_render.py

      - name: Check canonical links are live (blocks the /careers class of bug)
        run: python check_links.py

      - name: Publish approved company post for today
        env:
          # PERMANENT BY DESIGN -- same rationale as the `post` job above.
          # See COMPANY_SETUP.md for why we don't pursue a real org token.
          LINKEDIN_ORG_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          NOTIFY_FROM: ${{ vars.NOTIFY_FROM }}
          NOTIFY_ON_DRAFT: ${{ vars.NOTIFY_ON_DRAFT }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          POST_MODE: publish_approved
        run: python main.py

      - name: Commit updated company post status and dashboard
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add company_posts_history/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "publish (company): sweep $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin ${GITHUB_REF_NAME}
          python dashboard.py
          git add docs/
          git diff --cached --quiet || git commit -m "dashboard: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          for _try in 1 2 3; do
            git push origin HEAD:${GITHUB_REF_NAME} && break
            [ $_try -eq 3 ] && { echo "Push failed after 3 attempts"; exit 1; }
            echo "Push attempt $_try rejected -- rebasing and retrying..."
            git pull --rebase --autostash origin ${GITHUB_REF_NAME}
            python dashboard.py
            git add docs/
            git diff --cached --quiet || git commit -m "dashboard: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          done
