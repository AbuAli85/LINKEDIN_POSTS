name: Auto-post to LinkedIn

# Generates LinkedIn drafts on a schedule. Publishing requires an explicit manual action.

on:
  schedule:
    # 5:00 AM UTC = 9:00 AM Muscat (UTC+4) every Mon, Wed, Fri
    - cron: "0 5 * * 1,3,5"
  workflow_dispatch:
    inputs:
      action:
        description: "Choose generate_draft for safe drafting or publish_draft for an approved draft."
        required: true
        default: "generate_draft"
        type: choice
        options:
          - generate_draft
          - publish_draft
          - publish_now
          - fetch_metrics
          - fetch_comments
          - post_reply
      draft_file:
        description: "Draft JSON path to publish, e.g. posts_history/20260430_090000_ai.json. Required for publish_draft."
        required: false
        default: ""
      engagement_file:
        description: "Engagement JSON path for post_reply, e.g. engagement_history/20260430_120000_abc123.json."
        required: false
        default: ""
      pillar:
        description: "Force a specific pillar (leadership/ai/marketing). Leave blank to auto-pick."
        required: false
        default: ""
      dry_run:
        description: "For publish_now only: generate without publishing"
        required: false
        default: "false"
      confirm_publish_now:
        description: "Required safety flag for publish_now. Type true to allow immediate generation and publishing."
        required: false
        default: "false"
      model:
        description: "Override the Claude model (e.g. claude-sonnet-4-6, claude-haiku-4-5-20251001). Leave blank for default."
        required: false
        default: ""

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate draft or publish approved draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          POST_MODE: ${{ github.event_name == 'schedule' && 'generate_draft' || inputs.action }}
          PUBLISH_DRAFT_PATH: ${{ inputs.draft_file }}
          ENGAGEMENT_PATH: ${{ inputs.engagement_file }}
          FORCE_PILLAR: ${{ inputs.pillar }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CONFIRM_PUBLISH_NOW: ${{ inputs.confirm_publish_now || 'false' }}
          ANTHROPIC_MODEL: ${{ inputs.model }}
        run: python main.py

      - name: Generate dashboard
        if: always()
        run: python dashboard.py

      - name: Commit history and dashboard
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts_history/ engagement_history/ docs/
          git diff --cached --quiet || git commit -m "dashboard: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:${GITHUB_REF_NAME}
