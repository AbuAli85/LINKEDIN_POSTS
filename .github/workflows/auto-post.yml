name: Auto-post to LinkedIn

# Generates a LinkedIn post via Anthropic API and publishes it on a schedule.

on:
  schedule:
    # 5:00 AM UTC = 9:00 AM Muscat (UTC+4) every Mon, Wed, Fri
    - cron: "0 5 * * 1,3,5"
  workflow_dispatch:
    inputs:
      pillar:
        description: "Force a specific pillar (leadership/ai/marketing). Leave blank to auto-pick."
        required: false
        default: ""
      dry_run:
        description: "Generate only, do not publish"
        required: false
        default: "false"
      model:
        description: "Override the Claude model (e.g. claude-sonnet-4-6, claude-haiku-4-5-20251001). Leave blank for default."
        required: false
        default: ""

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and publish post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          FORCE_PILLAR: ${{ inputs.pillar }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          ANTHROPIC_MODEL: ${{ inputs.model }}
        run: python main.py

      - name: Generate dashboard
        if: always()
        run: python dashboard.py

      - name: Commit history and dashboard
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts_history/ docs/
          git diff --cached --quiet || git commit -m "dashboard: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
