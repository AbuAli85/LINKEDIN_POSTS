name: Auto-post to LinkedIn

# Two-phase automation:
#   Phase 1 — generate draft (Sat/Mon/Wed 5am UTC): creates a draft needing owner approval.
#   Phase 2 — publish approved (Mon/Wed/Fri 6am UTC): publishes the approved draft for today's pillar.
# Owner approves via the dashboard (marks JSON as approved); publishing is fully automatic.

on:
  schedule:
    # Phase 1: generate drafts — 2 days before publish day
    # Sat→Pain(Mon)  Mon→Proof(Wed)  Wed→Vision(Fri)
    - cron: "0 5 * * 6,1,3"
    # Phase 2: publish approved drafts on publish day
    - cron: "0 6 * * 1,3,5"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run."
        required: true
        default: "generate_draft"
        type: choice
        options:
          - generate_draft
          - publish_approved
          - publish_draft
          - revise_draft
          - publish_now
          - fetch_metrics
          - fetch_comments
          - post_reply
      draft_file:
        description: "Draft JSON path to publish, e.g. posts_history/20260430_090000_ai.json. Required for publish_draft."
        required: false
        default: ""
      engagement_file:
        description: "Engagement JSON path for post_reply, e.g. engagement_history/20260430_120000_abc123.json."
        required: false
        default: ""
      revision_notes:
        description: "Feedback for revise_draft: what to change, improve, or fix in the draft."
        required: false
        default: ""
      pillar:
        description: "Force a specific pillar (pain/proof/vision/conversion). Leave blank to auto-pick."
        required: false
        default: ""
      dry_run:
        description: "For publish_now only: generate without publishing"
        required: false
        default: "false"
      confirm_publish_now:
        description: "Required safety flag for publish_now. Type true to allow immediate generation and publishing."
        required: false
        default: "false"
      model:
        description: "Override the Claude model (e.g. claude-sonnet-4-6, claude-haiku-4-5-20251001). Leave blank for default."
        required: false
        default: ""

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # 5am UTC cron = generate draft; 6am UTC cron = publish approved
            HOUR=$(date -u +%H)
            [ "$HOUR" = "06" ] && echo "mode=publish_approved" >> "$GITHUB_OUTPUT" \
                                || echo "mode=generate_draft"   >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate draft or publish approved draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          NOTIFY_FROM: ${{ vars.NOTIFY_FROM }}
          NOTIFY_ON_DRAFT: ${{ vars.NOTIFY_ON_DRAFT }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          POST_MODE: ${{ steps.mode.outputs.mode }}
          PUBLISH_DRAFT_PATH: ${{ inputs.draft_file }}
          ENGAGEMENT_PATH: ${{ inputs.engagement_file }}
          REVISION_NOTES: ${{ inputs.revision_notes }}
          FORCE_PILLAR: ${{ inputs.pillar }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CONFIRM_PUBLISH_NOW: ${{ inputs.confirm_publish_now || 'false' }}
          ANTHROPIC_MODEL: ${{ inputs.model }}
        run: python main.py

      - name: Generate dashboard
        if: always()
        run: python dashboard.py

      - name: Commit history and dashboard
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts_history/ engagement_history/ docs/
          git diff --cached --quiet || git commit -m "dashboard: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin ${GITHUB_REF_NAME}
          git push origin HEAD:${GITHUB_REF_NAME}
