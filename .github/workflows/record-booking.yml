name: record-booking

on:
  repository_dispatch:
    types: [cal_booking]

jobs:
  record:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Append booking to bookings.json
        run: |
          python - <<'EOF'
          import json, os
          from datetime import datetime, timezone

          payload = json.loads(os.environ['BOOKING_PAYLOAD'])

          path = 'bookings.json'
          try:
              with open(path) as f:
                  bookings = json.load(f)
          except FileNotFoundError:
              bookings = []

          bookings.append({
              'booked_at':     payload.get('booked_at', datetime.now(timezone.utc).isoformat()),
              'event_type':    payload.get('event_type', 'unknown'),
              'utm_source':    payload.get('utm', {}).get('utm_source', ''),
              'utm_medium':    payload.get('utm', {}).get('utm_medium', ''),
              'utm_campaign':  payload.get('utm', {}).get('utm_campaign', ''),
              'utm_content':   payload.get('utm', {}).get('utm_content', ''),
          })

          with open(path, 'w') as f:
              json.dump(bookings, f, indent=2)

          print(f"Recorded booking #{len(bookings)}: {payload.get('event_type')} from {payload.get('utm', {}).get('utm_campaign', '(no campaign)')}")
          EOF
        env:
          BOOKING_PAYLOAD: ${{ toJson(github.event.client_payload) }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild dashboard
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
        run: python dashboard.py

      - name: Commit booking and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bookings.json docs/
          git diff --staged --quiet || git commit -m "chore: record booking $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase --autostash origin ${GITHUB_REF_NAME}
          for _try in 1 2 3; do
            git push origin HEAD:${GITHUB_REF_NAME} && break
            [ $_try -eq 3 ] && { echo "Push failed after 3 attempts"; exit 1; }
            echo "Push attempt $_try rejected — rebasing and retrying…"
            git pull --rebase --autostash origin ${GITHUB_REF_NAME}
          done
