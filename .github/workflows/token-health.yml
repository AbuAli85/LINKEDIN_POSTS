name: LinkedIn Token Health Check

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday 08:00 UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  issues: write
  contents: read

jobs:
  check-token:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Check LinkedIn token health + expiry countdown
        id: health
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_TOKEN_RENEWED_DATE: ${{ vars.LINKEDIN_TOKEN_RENEWED_DATE }}
          LINKEDIN_HEALTH_ENDPOINT: ${{ vars.LINKEDIN_HEALTH_ENDPOINT }}
        run: |
          set -uo pipefail

          # 1. Live API ping. /v2/userinfo (OpenID Connect) is the default --
          # it works with the openid/profile scopes this app already requests,
          # unlike the legacy /v2/me REST endpoint. Overridable via the
          # LINKEDIN_HEALTH_ENDPOINT repo variable without editing this file.
          ENDPOINT="${LINKEDIN_HEALTH_ENDPOINT:-https://api.linkedin.com/v2/userinfo}"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
            -H "Authorization: Bearer $LINKEDIN_ACCESS_TOKEN" \
            "$ENDPOINT") || STATUS="000"

          echo "HTTP status: $STATUS (endpoint: $ENDPOINT)"

          # Three states instead of a alive/dead binary, so a scope mismatch,
          # rate limit, or transient 5xx (403/429/5xx/network failure) can't
          # get reported as a confirmed "alive" -- it wasn't actually verified.
          if [ "$STATUS" = "401" ]; then
            TOKEN_STATE="dead"
            HEALTH_MSG="Token EXPIRED or REVOKED (HTTP 401 from $ENDPOINT). Renew immediately."
          elif [[ "$STATUS" =~ ^2[0-9][0-9]$ ]]; then
            TOKEN_STATE="alive"
            HEALTH_MSG="Token alive (HTTP $STATUS from $ENDPOINT)"
          else
            TOKEN_STATE="inconclusive"
            HEALTH_MSG="Health check inconclusive (HTTP $STATUS from $ENDPOINT) -- not a confirmed failure, but this run did not verify the token is working. If this persists, check the app's OAuth scopes or set LINKEDIN_HEALTH_ENDPOINT to a reachable endpoint."
          fi

          echo "token_state=$TOKEN_STATE" >> "$GITHUB_OUTPUT"
          echo "health_msg=$HEALTH_MSG"   >> "$GITHUB_OUTPUT"

          # 2. Expiry countdown (unchanged) -- independent of the live ping,
          # since it's derived from the renewal date, not a network call.
          DAYS_UNTIL_EXPIRY=99
          EXPIRY_MSG="LINKEDIN_TOKEN_RENEWED_DATE not set - cannot compute expiry countdown."

          if [ -n "$LINKEDIN_TOKEN_RENEWED_DATE" ]; then
            RENEWED_TS=$(date -d "$LINKEDIN_TOKEN_RENEWED_DATE" +%s 2>/dev/null || echo "")
            if [ -n "$RENEWED_TS" ]; then
              NOW_TS=$(date +%s)
              DAYS_ELAPSED=$(( (NOW_TS - RENEWED_TS) / 86400 ))
              DAYS_UNTIL_EXPIRY=$(( 60 - DAYS_ELAPSED ))
              if [ "$DAYS_UNTIL_EXPIRY" -le 0 ]; then
                EXPIRY_MSG="Token EXPIRED $((DAYS_UNTIL_EXPIRY * -1)) days ago based on renewal date."
              elif [ "$DAYS_UNTIL_EXPIRY" -le 7 ]; then
                EXPIRY_MSG="Token expires in ${DAYS_UNTIL_EXPIRY} days - RENEW NOW."
              elif [ "$DAYS_UNTIL_EXPIRY" -le 14 ]; then
                EXPIRY_MSG="Token expires in ${DAYS_UNTIL_EXPIRY} days - schedule renewal."
              else
                EXPIRY_MSG="Token valid for ~${DAYS_UNTIL_EXPIRY} more days (renewed: $LINKEDIN_TOKEN_RENEWED_DATE)"
              fi
            else
              EXPIRY_MSG="Could not parse LINKEDIN_TOKEN_RENEWED_DATE. Expected format: YYYY-MM-DD"
            fi
          fi

          echo "days_until_expiry=$DAYS_UNTIL_EXPIRY" >> "$GITHUB_OUTPUT"
          echo "expiry_msg=$EXPIRY_MSG"               >> "$GITHUB_OUTPUT"
          echo "Health: $HEALTH_MSG"
          echo "Expiry: $EXPIRY_MSG"

      - name: Create or update alert issue
        # Only a confirmed-dead token (401) or the date-based countdown opens/
        # updates an alert. "inconclusive" never does -- it isn't a confirmed
        # problem, and spamming an issue for a scope mismatch or a transient
        # 403/429/5xx would just train the owner to ignore these.
        if: |
          steps.health.outputs.token_state == 'dead' ||
          steps.health.outputs.days_until_expiry <= 7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          HEALTH_MSG="${{ steps.health.outputs.health_msg }}"
          EXPIRY_MSG="${{ steps.health.outputs.expiry_msg }}"
          DAYS="${{ steps.health.outputs.days_until_expiry }}"

          if [ "${{ steps.health.outputs.token_state }}" = "dead" ]; then
            TITLE="LinkedIn token EXPIRED - action required"
            URGENCY="CRITICAL"
          else
            TITLE="LinkedIn token expiring in ${DAYS} days - renew now"
            URGENCY="WARNING"
          fi

          BODY="## LinkedIn Token Alert - $URGENCY"$'\n\n'
          BODY+="**Health check:** $HEALTH_MSG"$'\n'
          BODY+="**Expiry status:** $EXPIRY_MSG"$'\n\n'
          BODY+="### How to renew"$'\n'
          BODY+="1. Go to LinkedIn Developer Portal and re-authorise the app"$'\n'
          BODY+="2. Copy the new access token to Settings > Secrets > LINKEDIN_ACCESS_TOKEN"$'\n'
          BODY+="3. Update Settings > Variables > LINKEDIN_TOKEN_RENEWED_DATE to today (YYYY-MM-DD)"$'\n'
          BODY+="4. Close this issue"$'\n\n'
          BODY+="> Token lifetime: LinkedIn OAuth 2.0 access tokens expire after 60 days."

          EXISTING=$(gh issue list \
            --repo "$REPO" \
            --label "linkedin-token" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue edit "$EXISTING" --repo "$REPO" --title "$TITLE" --body "$BODY"
            gh issue comment "$EXISTING" --repo "$REPO" \
              --body "Re-checked $(date -u +'%Y-%m-%d %H:%M UTC'): $HEALTH_MSG | $EXPIRY_MSG"
          else
            echo "Creating new alert issue"
            gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY" --label "linkedin-token"
          fi

      - name: Report inconclusive check (no issue created/closed)
        if: steps.health.outputs.token_state == 'inconclusive'
        run: |
          echo "::warning::${{ steps.health.outputs.health_msg }}"

      - name: Close resolved issue
        # Only a confirmed-alive token (real 2xx) closes an existing alert --
        # "inconclusive" must never be read as "healthy" here.
        if: |
          steps.health.outputs.token_state == 'alive' &&
          steps.health.outputs.days_until_expiry > 7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          EXISTING=$(gh issue list \
            --repo "$REPO" \
            --label "linkedin-token" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Token healthy - closing issue #$EXISTING"
            gh issue close "$EXISTING" --repo "$REPO" \
              --comment "Token health confirmed $(date -u +'%Y-%m-%d %H:%M UTC'). ${{ steps.health.outputs.expiry_msg }} - closing."
          else
            echo "No open token issue to close."
          fi

      - name: Summary
        if: always()
        run: |
          echo "## LinkedIn Token Health Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| State | ${{ steps.health.outputs.token_state }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API ping | ${{ steps.health.outputs.health_msg }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Expiry countdown | ${{ steps.health.outputs.expiry_msg }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run completed: $(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
