name: LinkedIn Token Health Check

on:
  schedule:
      - cron: '0 8 * * 1'   # Every Monday 08:00 UTC
        workflow_dispatch:       # Allow manual trigger

        jobs:
          check-token:
              runs-on: ubuntu-latest

                  steps:
                        - name: Check out repo
                                uses: actions/checkout@v4

                                      - name: Check LinkedIn token health + expiry countdown
                                              id: health
                                                      env:
                                                                LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
                                                                          LINKEDIN_TOKEN_RENEWED_DATE: ${{ vars.LINKEDIN_TOKEN_RENEWED_DATE }}
                                                                                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                              REPO: ${{ github.repository }}
                                                                                                      run: |
                                                                                                                # ── 1. Live API ping ──────────────────────────────────────────
                                                                                                                          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                                                                                                                                      -H "Authorization: Bearer $LINKEDIN_ACCESS_TOKEN" \
                                                                                                                                                  "https://api.linkedin.com/v2/me")
                                                                                                                                                  
                                                                                                                                                            echo "HTTP status: $STATUS"
                                                                                                                                                            
                                                                                                                                                                      if [ "$STATUS" = "401" ]; then
                                                                                                                                                                                  TOKEN_ALIVE="false"
                                                                                                                                                                                              HEALTH_MSG="Token EXPIRED or REVOKED (HTTP 401). Renew immediately."
                                                                                                                                                                                                        else
                                                                                                                                                                                                                    TOKEN_ALIVE="true"
                                                                                                                                                                                                                                HEALTH_MSG="Token alive (HTTP $STATUS)"
                                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                    echo "token_alive=$TOKEN_ALIVE" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                              echo "health_msg=$HEALTH_MSG"   >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                        # ── 2. Expiry countdown ───────────────────────────────────────
                                                                                                                                                                                                                                                                                  DAYS_UNTIL_EXPIRY=99
                                                                                                                                                                                                                                                                                            EXPIRY_MSG="LINKEDIN_TOKEN_RENEWED_DATE not set — cannot compute expiry countdown."
                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                      if [ -n "$LINKEDIN_TOKEN_RENEWED_DATE" ]; then
                                                                                                                                                                                                                                                                                                                  RENEWED_TS=$(date -d "$LINKEDIN_TOKEN_RENEWED_DATE" +%s 2>/dev/null || echo "")
                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                              if [ -n "$RENEWED_TS" ]; then
                                                                                                                                                                                                                                                                                                                                            NOW_TS=$(date +%s)
                                                                                                                                                                                                                                                                                                                                                          DAYS_ELAPSED=$(( (NOW_TS - RENEWED_TS) / 86400 ))
                                                                                                                                                                                                                                                                                                                                                                        DAYS_UNTIL_EXPIRY=$(( 60 - DAYS_ELAPSED ))
                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                      if [ $DAYS_UNTIL_EXPIRY -le 0 ]; then
                                                                                                                                                                                                                                                                                                                                                                                                      EXPIRY_MSG="Token EXPIRED $((DAYS_UNTIL_EXPIRY * -1)) days ago based on renewal date."
                                                                                                                                                                                                                                                                                                                                                                                                                    elif [ $DAYS_UNTIL_EXPIRY -le 7 ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                    EXPIRY_MSG="Token expires in ${DAYS_UNTIL_EXPIRY} days — RENEW NOW."
                                                                                                                                                                                                                                                                                                                                                                                                                                                  elif [ $DAYS_UNTIL_EXPIRY -le 14 ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  EXPIRY_MSG="Token expires in ${DAYS_UNTIL_EXPIRY} days — schedule renewal."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                EXPIRY_MSG="Token valid for ~${DAYS_UNTIL_EXPIRY} more days (renewed: $LINKEDIN_TOKEN_RENEWED_DATE)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        EXPIRY_MSG="Could not parse LINKEDIN_TOKEN_RENEWED_DATE='$LINKEDIN_TOKEN_RENEWED_DATE'. Expected format: YYYY-MM-DD"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "days_until_expiry=$DAYS_UNTIL_EXPIRY" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "expiry_msg=$EXPIRY_MSG"               >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "--- Health Report ---"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "$HEALTH_MSG"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "$EXPIRY_MSG"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # ── 3. Create/update GitHub issue if token is dead or expiry <= 7d ─
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Create or update alert issue
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              steps.health.outputs.token_alive == 'false' ||
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        steps.health.outputs.days_until_expiry <= 7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    REPO: ${{ github.repository }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      HEALTH_MSG="${{ steps.health.outputs.health_msg }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                EXPIRY_MSG="${{ steps.health.outputs.expiry_msg }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          DAYS="${{ steps.health.outputs.days_until_expiry }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if [ "${{ steps.health.outputs.token_alive }}" = "false" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                TITLE="LinkedIn token EXPIRED — action required"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            URGENCY="CRITICAL"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  TITLE="LinkedIn token expiring in ${DAYS} days — renew now"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              URGENCY="WARNING"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  BODY="## LinkedIn Token Alert — $URGENCY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            **Health check:** $HEALTH_MSG
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      **Expiry status:** $EXPIRY_MSG
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ### How to renew
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          1. Go to LinkedIn Developer Portal and re-authorise the app
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    2. Copy the new access token to Settings > Secrets > LINKEDIN_ACCESS_TOKEN
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              3. Update the repo variable Settings > Variables > LINKEDIN_TOKEN_RENEWED_DATE to today (YYYY-MM-DD)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        4. Close this issue
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  > Token lifetime: LinkedIn OAuth 2.0 access tokens expire after 60 days.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      EXISTING=$(gh issue list \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  --repo "$REPO" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              --label "linkedin-token" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          --state open \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      --json number \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  --jq '.[0].number' 2>/dev/null || echo "")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "Updating existing issue #$EXISTING"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    gh issue edit "$EXISTING" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  --repo "$REPO" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --title "$TITLE" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              --body "$BODY"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          gh issue comment "$EXISTING" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        --repo "$REPO" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      --body "Re-checked $(date -u +'%Y-%m-%d %H:%M UTC'): $HEALTH_MSG | $EXPIRY_MSG"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Creating new alert issue"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        gh issue create \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      --repo "$REPO" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    --title "$TITLE" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  --body "$BODY" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --label "linkedin-token"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # ── 4. Close resolved issue when token is healthy with > 7d remaining ─
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Close resolved issue
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        steps.health.outputs.token_alive == 'true' &&
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  steps.health.outputs.days_until_expiry > 7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              REPO: ${{ github.repository }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                EXISTING=$(gh issue list \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            --repo "$REPO" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        --label "linkedin-token" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    --state open \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --json number \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            --jq '.[0].number' 2>/dev/null || echo "")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "Token healthy — closing issue #$EXISTING"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              gh issue close "$EXISTING" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            --repo "$REPO" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          --comment "Token health confirmed $(date -u +'%Y-%m-%d %H:%M UTC'). ${{ steps.health.outputs.expiry_msg }} — closing."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "No open token issue to close."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # ── 5. Always print summary ─────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Summary
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "## LinkedIn Token Health Summary" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "| API ping | ${{ steps.health.outputs.health_msg }} |" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "| Expiry countdown | ${{ steps.health.outputs.expiry_msg }} |" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "> To update the renewal date: Settings > Variables > LINKEDIN_TOKEN_RENEWED_DATE (format: YYYY-MM-DD)" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
